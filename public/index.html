<!DOCTYPE html>
<!-- Указывает браузеру, что документ написан в стандарте HTML5 -->
<html lang="ru">
  <!-- lang="ru" — атрибут языка.-->

  <head>
    <!-- Служебная информация о странице, не отображается напрямую в окне браузера -->

    <meta charset="utf-8" />
    <!-- Кодировка UTF-8 — поддерживает все символы, включая эмодзи.-->

    <link rel="icon" href="%PUBLIC_URL%/logo.svg" />
    <!-- Иконка вкладки браузера (favicon). %PUBLIC_URL% — переменная, которую заменит сборщик -->

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Управляет масштабированием на мобильных устройствах:
         width=device-width — ширина окна = ширине экрана,
         initial-scale=1 — начальный масштаб 100% -->

    <meta name="theme-color" content="#000000" />
    <!-- Цвет адресной строки/панели инструментов в мобильных браузерах  -->

    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <!-- Краткое описание страницы — используется поисковиками и соцсетями  -->

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!-- Иконка для добавления сайта на домашний экран iPhone/iPad (в режиме "Веб-приложение") -->

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!-- PWA-манифест: позволяет установить сайт как приложение, задаёт стартовый URL, тему, иконки -->

    <title>Кофейня</title>
    <!-- Заголовок вкладки браузера. -->
  </head>

  <body>
    <!-- Тело документа — видимая часть страницы -->

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- Блок, который отображается, если у пользователя отключён JavaScript.
         Предупреждает, что приложению нужны скрипты  -->

    <div id="root"></div>
    <!-- Контейнер, в который React будет рендерить всё приложение. -->
  </body>
</html>
